function generateStyle8(builder, cfg) {
  const { canvasW, canvasH, align, nameText, infoText, fontFamily, baseSize,
    nameSize, infoSize, nameWeight, infoWeight, nameTransform, infoTransform,
    nameColor, infoColor, bgColor, borderColor, corners, borderThickness, bgEnabled,
    logoEnabled, logoSize, logoData, logoW, logoH,
    marginH, marginV, lineSpacing, hideName, hideInfo,
    nameColorAlpha, infoColorAlpha, bgColorAlpha, borderColorAlpha } = cfg;

  const inF = builder.inFrames;
  const holdF = builder.holdFrames;
  const outF = builder.outFrames;

  const nameSizePx = emToPx(nameSize, baseSize);
  const infoSizePx = emToPx(infoSize, baseSize);
  const paddingX = emToPx(1.0, baseSize);
  const paddingY = emToPx(0.6, baseSize);
  const lineSpacingPx = emToPx(lineSpacing, baseSize);
  const marginHPx = remToPx(marginH, baseSize);
  const marginVPx = remToPx(marginV, baseSize);
  const borderPx = borderThickness * baseSize * 0.15;
  const isRight = align === 'right';
  const isCenter = align === 'center';
  const slant = isCenter ? 0 : emToPx(2.5, baseSize);

  const bgLottie = hexToLottie(bgColor);
  const borderLottie = hexToLottie(borderColor);
  const nameCLottie = hexToLottie(nameColor);
  const infoCLottie = hexToLottie(infoColor);

  // Text measurements
  const nameM = measureText(nameText, fontFamily, nameSizePx, nameWeight, nameTransform);
  const infoM = measureText(infoText, fontFamily, infoSizePx, infoWeight, infoTransform);

  // Bar dimensions — extends full canvas width with overflow for slant
  const overflow = emToPx(2, baseSize);
  const barLeft = -overflow;
  const barRight = canvasW + overflow;

  // Content height within the bar
  const infoBlockH = hideInfo ? 0 : infoSizePx;
  const nameBlockH = hideName ? 0 : nameSizePx;
  const gap = (!hideName && !hideInfo) ? lineSpacingPx * 0.05 : 0;
  const contentH = infoBlockH + gap + nameBlockH + paddingY * 5;
  const barH = contentH + slant;

  // Bar Y position — bottom of bar sits at canvasH, shape defined relative to layer center
  // The bar layer position will be animated (slides up from below)
  const barFinalY = canvasH - barH / 2;

  // Diagonal shape vertices (relative to layer center at 0,0)
  // For left-align: top-left is highest (taller on left), top-right is lowest
  // For right-align: reversed
  const halfW = (barRight - barLeft) / 2;
  const halfH = barH / 2;
  let vertices;
  if (isRight) {
    vertices = [
      [-halfW, -halfH + slant],  // top-left (lower)
      [halfW, -halfH],            // top-right (higher)
      [halfW, halfH],             // bottom-right
      [-halfW, halfH]             // bottom-left
    ];
  } else {
    vertices = [
      [-halfW, -halfH],           // top-left (higher)
      [halfW, -halfH + slant],    // top-right (lower)
      [halfW, halfH],             // bottom-right
      [-halfW, halfH]             // bottom-left
    ];
  }

  // Shift both BG and border down together (less shift for center since no slant)
  const bgInset = isCenter ? emToPx(-0.3, baseSize) : emToPx(1.5, baseSize);
  vertices[0] = [vertices[0][0], vertices[0][1] + bgInset];
  vertices[1] = [vertices[1][0], vertices[1][1] + bgInset];
  const lineVertices = [vertices[0], vertices[1]];

  // Text positioning
  const justify = isCenter ? 2 : (isRight ? 1 : 0);
  let textX;
  if (isCenter) {
    textX = canvasW / 2;
  } else if (isRight) {
    textX = canvasW - marginHPx - paddingX;
  } else {
    textX = marginHPx + paddingX;
  }

  // Text Y positions relative to bar center (0,0) — info above name
  // Offset from the top of the bar content area (below the highest point of the diagonal)
  const contentTopY = -halfH + slant + paddingY * 2.0;
  const infoRelY = hideInfo ? contentTopY : contentTopY + infoSizePx * 0.4;
  const nameRelY = infoRelY + (hideInfo ? 0 : infoBlockH + gap) + (hideName ? 0 : nameSizePx * 0.7);

  // Slide-up animation for the bar
  const slideFrom = canvasH + barH;
  const barPosKFs = buildKeyframes([
    { pct: 0, value: [canvasW / 2, slideFrom, 0] },
    { pct: 0, value: [canvasW / 2, slideFrom, 0] },
    { pct: 40, value: [canvasW / 2, barFinalY, 0] }
  ], inF, holdF, outF, EASING);

  // ============= LAYERS (top to bottom render order) =============

  // --- Info text ---
  if (!hideInfo) {
    const infoTextData = makeTextData(infoText, fontFamily, infoSizePx, parseInt(infoWeight), infoCLottie, infoTransform, justify);
    infoTextData.a.push(makeTextRevealAnimator(30, 65, -infoSizePx * 0.6, inF, holdF, outF));

    builder.addFont(fontFamily, parseInt(infoWeight));
    const infoPosKFs = buildKeyframes([
      { pct: 0, value: [textX, slideFrom + infoRelY, 0] },
      { pct: 0, value: [textX, slideFrom + infoRelY, 0] },
      { pct: 40, value: [textX, barFinalY + infoRelY, 0] }
    ], inF, holdF, outF, EASING);

    builder.addTextLayer('Info', infoTextData, {
      o: LottieBuilder.staticProp(infoColorAlpha), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.animatedProp(infoPosKFs),
      a: LottieBuilder.staticProp([0, 0, 0]), s: LottieBuilder.staticProp([100, 100, 100])
    });
  }

  // --- Name text ---
  if (!hideName) {
    const nameTextData = makeTextData(nameText, fontFamily, nameSizePx, parseInt(nameWeight), nameCLottie, nameTransform, justify);
    nameTextData.a.push(makeTextRevealAnimator(35, 70, -nameSizePx * 0.6, inF, holdF, outF));

    builder.addFont(fontFamily, parseInt(nameWeight));
    const namePosKFs = buildKeyframes([
      { pct: 0, value: [textX, slideFrom + nameRelY, 0] },
      { pct: 0, value: [textX, slideFrom + nameRelY, 0] },
      { pct: 40, value: [textX, barFinalY + nameRelY, 0] }
    ], inF, holdF, outF, EASING);

    builder.addTextLayer('Name', nameTextData, {
      o: LottieBuilder.staticProp(nameColorAlpha), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.animatedProp(namePosKFs),
      a: LottieBuilder.staticProp([0, 0, 0]), s: LottieBuilder.staticProp([100, 100, 100])
    });
  }

  // --- Diagonal line (top edge, rendered in front of BG) ---
  if (borderPx > 0) {
    const lineItems = [
      makePath(lineVertices, false),
      makeStroke(borderLottie, borderPx, borderColorAlpha)
    ];

    builder.addShapeLayer('Diagonal Line', [makeGroup(lineItems)], {
      o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.animatedProp(barPosKFs),
      a: LottieBuilder.staticProp([0, 0, 0]),
      s: LottieBuilder.staticProp([100, 100, 100])
    });
  }

  // --- Diagonal bar background ---
  if (bgEnabled) {
    const barItems = [
      makePath(vertices),
      makeFill(bgLottie, bgColorAlpha)
    ];

    builder.addShapeLayer('Diagonal BG', [makeGroup(barItems)], {
      o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.animatedProp(barPosKFs),
      a: LottieBuilder.staticProp([0, 0, 0]),
      s: LottieBuilder.staticProp([100, 100, 100])
    });
  }
}

// ============================================================
// STYLE 9 — DIAGONAL WIPE (two-pass wipe with color change)
// ============================================================

function generateStyle9(builder, cfg) {
  const { canvasW, canvasH, align, nameText, infoText, fontFamily, baseSize,
    nameSize, infoSize, nameWeight, infoWeight, nameTransform, infoTransform,
    nameColor, infoColor, accentColor, logoEnabled, logoSize, logoData, logoW, logoH,
    marginH, marginV, lineSpacing, hideName, hideInfo,
    nameColorAlpha, infoColorAlpha, accentColorAlpha } = cfg;

  const inF = builder.inFrames;
  const holdF = builder.holdFrames;
  const outF = builder.outFrames;
  const totalOut = inF + holdF;
  const e = EASING;

  const nameSizePx = emToPx(nameSize, baseSize);
  const infoSizePx = emToPx(infoSize, baseSize);
  const nameM = measureText(nameText, fontFamily, nameSizePx, nameWeight, nameTransform);
  const infoM = measureText(infoText, fontFamily, infoSizePx, infoWeight, infoTransform);

  const lineSpacingPx = emToPx(lineSpacing, baseSize);
  const marginHPx = remToPx(marginH, baseSize);
  const marginVPx = remToPx(marginV, baseSize);

  const accentLottie = hexToLottie(accentColor);
  const nameCLottie = hexToLottie(nameColor);
  const infoCLottie = hexToLottie(infoColor);

  const isRight = align === 'right';
  const isCenter = align === 'center';

  // Logo space
  const logoSizePx = emToPx(logoSize, baseSize);
  const logoMargin = emToPx(1.0, baseSize);
  const hasLogo = logoEnabled && logoData;
  const logoSpace = hasLogo ? logoSizePx + logoMargin : 0;

  // Vertical positioning: name above info
  const nameBlockH = hideName ? 0 : nameSizePx;
  const infoBlockH = hideInfo ? 0 : infoSizePx;
  const gap = (!hideName && !hideInfo) ? lineSpacingPx : 0;
  const totalH = nameBlockH + gap + infoBlockH;
  const blockTopY = canvasH - marginVPx - totalH;
  const nameCY = blockTopY + nameBlockH / 2;
  const infoCY = blockTopY + nameBlockH + gap + infoBlockH / 2;

  // Horizontal positioning
  let nameTextX, infoTextX, justify;
  if (isCenter) {
    nameTextX = canvasW / 2;
    infoTextX = canvasW / 2;
    justify = 2;
  } else if (isRight) {
    nameTextX = canvasW - marginHPx - logoSpace;
    infoTextX = canvasW - marginHPx - logoSpace;
    justify = 1;
  } else {
    nameTextX = marginHPx + logoSpace;
    infoTextX = marginHPx + logoSpace;
    justify = 0;
  }

  const nameTextY = nameCY + nameSizePx * 0.35;
  const infoTextY = infoCY + infoSizePx * 0.35;

  // Diagonal wipe parameters
  const slant = emToPx(1.0, baseSize);
  const padding = emToPx(1.0, baseSize);
  const maskH = totalH + padding * 2;
  const lineThickness = Math.max(2, baseSize * 0.08);

  // Text bounds — how far the text extends horizontally
  const maxTextW = Math.max(hideName ? 0 : nameM.width, hideInfo ? 0 : infoM.width);
  let textLeftX, textRightX;
  if (isCenter) {
    textLeftX = canvasW / 2 - maxTextW / 2 - logoSpace;
    textRightX = canvasW / 2 + maxTextW / 2;
  } else if (isRight) {
    textRightX = canvasW - marginHPx;
    textLeftX = textRightX - maxTextW - logoSpace;
  } else {
    textLeftX = marginHPx;
    textRightX = textLeftX + maxTextW + logoSpace;
  }
  const wipeMargin = padding;
  const wipeLeft = textLeftX - wipeMargin - slant;
  const wipeRight = textRightX + wipeMargin + slant;

  // Mask is oversized so it fully covers text at any wipe position
  const maskW = (wipeRight - wipeLeft) + slant + padding * 2;
  const halfMW = maskW / 2;
  const halfMH = maskH / 2;

  // For right alignment: mirror the slant and wipe direction
  const dir = isRight ? -1 : 1; // 1 = left-to-right, -1 = right-to-left

  // Mask polygon: leading edge is diagonal, trailing edge is straight
  // Left/center: wipes left→right, diagonal on right edge (/)
  // Right: wipes right→left, diagonal on left edge (\), but leading edge is still
  //        the side that sweeps across — for right that's the LEFT edge of the mask
  const maskVertices = isRight ? [
    [-halfMW, -halfMH],
    [halfMW, -halfMH],
    [halfMW, halfMH],
    [-halfMW + slant, halfMH]
  ] : [
    [-halfMW, -halfMH],
    [halfMW, -halfMH],
    [halfMW - slant, halfMH],
    [-halfMW, halfMH]
  ];

  // Diagonal line vertices (matches the mask's leading edge angle)
  const lineVertices = isRight ? [
    [0, -halfMH],
    [slant, halfMH]
  ] : [
    [0, -halfMH],
    [-slant, halfMH]
  ];

  const maskCY = blockTopY + totalH / 2;

  // offStart = mask hidden (before wipe), offEnd = mask fully covering text
  // For left/center: start left, end right. For right: start right, end left.
  let offStart, offEnd, lineEdgeOffset;
  if (isRight) {
    // Diagonal edge is on the LEFT: centerX - halfMW + slant (top), centerX - halfMW (bottom)
    offStart = wipeRight + halfMW + slant;
    offEnd = wipeLeft + halfMW - slant * 2;
    lineEdgeOffset = -halfMW;
  } else {
    // Diagonal edge is on the RIGHT: centerX + halfMW (top), centerX + halfMW - slant (bottom)
    offStart = wipeLeft - halfMW - slant;
    offEnd = wipeRight - halfMW + slant * 2;
    lineEdgeOffset = halfMW;
  }

  const fadeIn = 0.08;

  // Use linear easing at midpoint so motion is constant through the turnaround
  const L = LINEAR;

  function buildWipeMaskKFs() {
    const kfs = [];
    kfs.push(LottieBuilder.kf(0, [offStart, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(Math.round(inF * fadeIn), [offStart, maskCY, 0], L));
    kfs.push(LottieBuilder.kf(Math.round(inF * 0.5), [offEnd, maskCY, 0], L));
    kfs.push(LottieBuilder.kf(inF, [offStart, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(totalOut, [offStart, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(Math.round(totalOut + outF * 0.5), [offEnd, maskCY, 0], L));
    kfs.push(LottieBuilder.kf(Math.round(totalOut + outF * (1 - fadeIn)), [offStart, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(totalOut + outF, [offStart, maskCY, 0]));
    return kfs;
  }

  function buildRevealMaskKFs() {
    const kfs = [];
    kfs.push(LottieBuilder.kf(0, [offStart, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(Math.round(inF * fadeIn), [offStart, maskCY, 0], L));
    kfs.push(LottieBuilder.kf(Math.round(inF * 0.5), [offEnd, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(inF, [offEnd, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(totalOut, [offEnd, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(Math.round(totalOut + outF * 0.5), [offEnd, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(Math.round(totalOut + outF * (1 - fadeIn)), [offStart, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(totalOut + outF, [offStart, maskCY, 0]));
    return kfs;
  }

  function buildLineKFs() {
    const kfs = [];
    kfs.push(LottieBuilder.kf(0, [offStart + lineEdgeOffset, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(Math.round(inF * fadeIn), [offStart + lineEdgeOffset, maskCY, 0], L));
    kfs.push(LottieBuilder.kf(Math.round(inF * 0.5), [offEnd + lineEdgeOffset, maskCY, 0], L));
    kfs.push(LottieBuilder.kf(inF, [offStart + lineEdgeOffset, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(totalOut, [offStart + lineEdgeOffset, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(Math.round(totalOut + outF * 0.5), [offEnd + lineEdgeOffset, maskCY, 0], L));
    kfs.push(LottieBuilder.kf(Math.round(totalOut + outF * (1 - fadeIn)), [offStart + lineEdgeOffset, maskCY, 0], e));
    kfs.push(LottieBuilder.kf(totalOut + outF, [offStart + lineEdgeOffset, maskCY, 0]));
    return kfs;
  }

  // Line opacity: visible during both wipe passes, hidden during hold
  function buildLineOpacityKFs() {
    const kfs = [];
    // IN: fade in, then visible for both passes
    kfs.push(LottieBuilder.kf(0, [0], e));
    kfs.push(LottieBuilder.kf(Math.round(inF * 0.08), [100], e));
    kfs.push(LottieBuilder.kf(Math.round(inF * 0.95), [100], e));
    kfs.push(LottieBuilder.kf(inF, [0], e));
    // Hold: hidden
    kfs.push(LottieBuilder.kf(totalOut, [0], e));
    // OUT: fade in, visible for both passes, fade out at end
    kfs.push(LottieBuilder.kf(Math.round(totalOut + outF * 0.05), [100], e));
    kfs.push(LottieBuilder.kf(Math.round(totalOut + outF * 0.95), [100], e));
    kfs.push(LottieBuilder.kf(totalOut + outF, [0]));
    return kfs;
  }

  const wipeMaskKFs = buildWipeMaskKFs();
  const revealMaskKFs = buildRevealMaskKFs();
  const lineKFs = buildLineKFs();
  const lineOpacityKFs = buildLineOpacityKFs();

  // ============= LAYERS (top to bottom render order) =============

  // --- Diagonal line (visual element) ---
  builder.addShapeLayer('Diagonal Line', [makeGroup([
    makePath(lineVertices, false),
    makeStroke(accentLottie, lineThickness, accentColorAlpha)
  ])], {
    o: LottieBuilder.animatedProp(lineOpacityKFs), r: LottieBuilder.staticProp(0),
    p: LottieBuilder.animatedProp(lineKFs),
    a: LottieBuilder.staticProp([0, 0, 0]),
    s: LottieBuilder.staticProp([100, 100, 100])
  });

  // --- Accent name text (mask + text) ---
  if (!hideName) {
    builder.addShapeLayer('Accent Name Mask', [makeGroup([
      makePath(maskVertices),
      makeFill([1, 1, 1])
    ])], {
      o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.animatedProp(wipeMaskKFs),
      a: LottieBuilder.staticProp([0, 0, 0]),
      s: LottieBuilder.staticProp([100, 100, 100])
    }, { td: 1 });

    const accentNameData = makeTextData(nameText, fontFamily, nameSizePx, parseInt(nameWeight), accentLottie, nameTransform, justify);
    builder.addFont(fontFamily, parseInt(nameWeight));
    builder.addTextLayer('Accent Name', accentNameData, {
      o: LottieBuilder.staticProp(accentColorAlpha), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.staticProp([nameTextX, nameTextY, 0]),
      a: LottieBuilder.staticProp([0, 0, 0]), s: LottieBuilder.staticProp([100, 100, 100])
    }, { tt: 1 });
  }

  // --- Accent info text (mask + text) ---
  if (!hideInfo) {
    builder.addShapeLayer('Accent Info Mask', [makeGroup([
      makePath(maskVertices),
      makeFill([1, 1, 1])
    ])], {
      o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.animatedProp(wipeMaskKFs),
      a: LottieBuilder.staticProp([0, 0, 0]),
      s: LottieBuilder.staticProp([100, 100, 100])
    }, { td: 1 });

    const accentInfoData = makeTextData(infoText, fontFamily, infoSizePx, parseInt(infoWeight), accentLottie, infoTransform, justify);
    builder.addFont(fontFamily, parseInt(infoWeight));
    builder.addTextLayer('Accent Info', accentInfoData, {
      o: LottieBuilder.staticProp(infoColorAlpha), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.staticProp([infoTextX, infoTextY, 0]),
      a: LottieBuilder.staticProp([0, 0, 0]), s: LottieBuilder.staticProp([100, 100, 100])
    }, { tt: 1 });
  }

  // --- Normal name text (revealed by separate mask, stays visible) ---
  if (!hideName) {
    builder.addShapeLayer('Name Reveal Mask', [makeGroup([
      makePath(maskVertices),
      makeFill([1, 1, 1])
    ])], {
      o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.animatedProp(revealMaskKFs),
      a: LottieBuilder.staticProp([0, 0, 0]),
      s: LottieBuilder.staticProp([100, 100, 100])
    }, { td: 1 });

    const nameData = makeTextData(nameText, fontFamily, nameSizePx, parseInt(nameWeight), nameCLottie, nameTransform, justify);
    builder.addFont(fontFamily, parseInt(nameWeight));
    builder.addTextLayer('Name', nameData, {
      o: LottieBuilder.staticProp(nameColorAlpha), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.staticProp([nameTextX, nameTextY, 0]),
      a: LottieBuilder.staticProp([0, 0, 0]), s: LottieBuilder.staticProp([100, 100, 100])
    }, { tt: 1 });
  }

  // --- Normal info text (revealed by separate mask, stays visible) ---
  if (!hideInfo) {
    builder.addShapeLayer('Info Reveal Mask', [makeGroup([
      makePath(maskVertices),
      makeFill([1, 1, 1])
    ])], {
      o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.animatedProp(revealMaskKFs),
      a: LottieBuilder.staticProp([0, 0, 0]),
      s: LottieBuilder.staticProp([100, 100, 100])
    }, { td: 1 });

    const infoData = makeTextData(infoText, fontFamily, infoSizePx, parseInt(infoWeight), infoCLottie, infoTransform, justify);
    builder.addFont(fontFamily, parseInt(infoWeight));
    builder.addTextLayer('Info', infoData, {
      o: LottieBuilder.staticProp(infoColorAlpha), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.staticProp([infoTextX, infoTextY, 0]),
      a: LottieBuilder.staticProp([0, 0, 0]), s: LottieBuilder.staticProp([100, 100, 100])
    }, { tt: 1 });
  }

  // --- Logo (optional) ---
  if (hasLogo) {
    const logoAspect = logoW && logoH ? logoW / logoH : 1;
    const lH = logoSizePx;
    const _logoScale = (lH / logoH) * 100;

    let logoCX;
    if (isCenter) {
      const maxW = Math.max(hideName ? 0 : nameM.width, hideInfo ? 0 : infoM.width);
      logoCX = canvasW / 2 - maxW / 2 - logoMargin - logoSizePx / 2;
    } else if (isRight) {
      logoCX = canvasW - marginHPx - logoSizePx / 2;
    } else {
      logoCX = marginHPx + logoSizePx / 2;
    }
    const logoCY = (infoCY + nameCY) / 2;

    const logoScaleKFs = buildKeyframes([
      { pct: 0, value: [0, 0, 100] },
      { pct: 25, value: [_logoScale, _logoScale, 100] },
      { pct: 100, value: [_logoScale, _logoScale, 100] }
    ], inF, holdF, outF, EASING);

    builder.addImageAsset('logo', logoData, logoW, logoH);
    builder.addImageLayer('Logo', 'logo', {
      o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.staticProp([logoCX, logoCY, 0]),
      a: LottieBuilder.staticProp([logoW / 2, logoH / 2, 0]),
      s: LottieBuilder.animatedProp(logoScaleKFs)
    });
  }
}

// ============================================================
// STYLE 10 — DOUBLE LINE (two horizontal lines framing the name)
// ============================================================

function generateStyle10(builder, cfg) {
  const { canvasW, canvasH, align, nameText, infoText, fontFamily, baseSize,
    nameSize, infoSize, nameWeight, infoWeight, nameTransform, infoTransform,
    nameColor, infoColor, accentColor, borderColor, logoEnabled, logoSize, logoData, logoW, logoH,
    marginH, marginV, lineSpacing, hideName, hideInfo,
    nameColorAlpha, infoColorAlpha, accentColorAlpha, borderColorAlpha, borderThickness } = cfg;

  const inF = builder.inFrames;
  const holdF = builder.holdFrames;
  const outF = builder.outFrames;

  const nameSizePx = emToPx(nameSize, baseSize);
  const infoSizePx = emToPx(infoSize, baseSize);
  const nameM = measureText(nameText, fontFamily, nameSizePx, nameWeight, nameTransform);
  const infoM = measureText(infoText, fontFamily, infoSizePx, infoWeight, infoTransform);

  const paddingX = emToPx(0.6, baseSize);
  const lineGap = emToPx(0.4, baseSize);
  const marginHPx = remToPx(marginH, baseSize);
  const marginVPx = remToPx(marginV, baseSize);
  const linePx = Math.max(2, borderThickness * baseSize * 0.1);

  const accentLottie = hexToLottie(accentColor);
  const nameCLottie = hexToLottie(nameColor);
  const infoCLottie = hexToLottie(infoColor);

  const isRight = align === 'right';
  const isCenter = align === 'center';

  // Logo space
  const logoSizePx = emToPx(logoSize, baseSize);
  const logoMargin = emToPx(1.0, baseSize);
  const hasLogo = logoEnabled && logoData;
  const logoSpace = hasLogo ? logoSizePx + logoMargin : 0;

  // Line width = extends well beyond text
  const nameContentW = hideName ? 0 : nameM.width + paddingX * 2;
  const infoContentW = hideInfo ? 0 : infoM.width + paddingX * 2;
  const textW = Math.max(nameContentW, infoContentW, emToPx(4, baseSize));
  const lineW = textW + emToPx(0.5, baseSize);

  // Vertical positioning: top line, name, bottom line, info
  const nameBlockH = hideName ? 0 : nameSizePx;
  const infoBlockH = hideInfo ? 0 : infoSizePx;
  const gapName = hideName ? 0 : lineGap;
  const gapInfo = hideInfo ? 0 : lineGap;
  const totalH = linePx + gapName + nameBlockH + gapName + linePx + gapInfo + infoBlockH;
  const blockTopY = canvasH - marginVPx - totalH;

  const topLineCY = blockTopY + linePx / 2;
  const nameCY = blockTopY + linePx + gapName + nameBlockH / 2;
  const bottomLineCY = blockTopY + linePx + gapName + nameBlockH + gapName + linePx / 2;
  const infoCY = bottomLineCY + linePx / 2 + gapInfo + infoBlockH / 2;

  // Horizontal positioning
  let linePosX, nameTextX, infoTextX, justify;
  let lineAnchorX;

  if (isCenter) {
    nameTextX = canvasW / 2;
    infoTextX = canvasW / 2;
    justify = 2;
    linePosX = canvasW / 2;
    lineAnchorX = 0;
  } else if (isRight) {
    const textEdge = canvasW - marginHPx - logoSpace;
    nameTextX = textEdge;
    infoTextX = textEdge;
    justify = 1;
    // Anchor at right edge of line = text right edge, line extends left
    linePosX = textEdge;
    lineAnchorX = lineW / 2;
  } else {
    const textEdge = marginHPx + logoSpace;
    nameTextX = textEdge;
    infoTextX = textEdge;
    justify = 0;
    // Anchor at left edge of line = text left edge, line extends right
    linePosX = textEdge;
    lineAnchorX = -lineW / 2;
  }

  const nameTextY = nameCY + nameSizePx * 0.35;
  const infoTextY = infoCY + infoSizePx * 0.35;

  // --- Animation timing ---
  // Lines expand from alignment side (left-to-right for left, right-to-left for right)
  const topLineInKFs = buildKeyframes([
    { pct: 0, value: [0, linePx] },
    { pct: 40, value: [lineW, linePx] },
    { pct: 100, value: [lineW, linePx] }
  ], inF, holdF, outF, EASING);

  const bottomLineInKFs = buildKeyframes([
    { pct: 0, value: [0, linePx] },
    { pct: 15, value: [0, linePx] },
    { pct: 45, value: [lineW, linePx] },
    { pct: 100, value: [lineW, linePx] }
  ], inF, holdF, outF, EASING);

  // Name slides up from bottom line to its position
  const nameSlideKFs = buildKeyframes([
    { pct: 0, value: [nameTextX, bottomLineCY + nameSizePx * 1.2, 0] },
    { pct: 25, value: [nameTextX, bottomLineCY + nameSizePx * 1.2, 0] },
    { pct: 55, value: [nameTextX, nameTextY, 0] },
    { pct: 100, value: [nameTextX, nameTextY, 0] }
  ], inF, holdF, outF, EASING);

  // Name mask: covers the area above the bottom line where name will be visible
  const nameMaskH = nameBlockH + gapName * 2;
  const nameMaskCY = nameCY;

  // ============= LAYERS (top to bottom render order) =============

  // --- Name mask + text (slides up from behind bottom line) ---
  if (!hideName) {
    builder.addShapeLayer('Name Mask', [makeGroup([
      makeRect(lineW, nameMaskH, 0),
      makeFill([1, 1, 1])
    ])], {
      o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.staticProp([linePosX, nameMaskCY, 0]),
      a: LottieBuilder.staticProp([lineAnchorX, 0, 0]),
      s: LottieBuilder.staticProp([100, 100, 100])
    }, { td: 1 });

    const nameTextData = makeTextData(nameText, fontFamily, nameSizePx, parseInt(nameWeight), nameCLottie, nameTransform, justify);

    builder.addFont(fontFamily, parseInt(nameWeight));
    builder.addTextLayer('Name', nameTextData, {
      o: LottieBuilder.staticProp(nameColorAlpha), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.animatedProp(nameSlideKFs),
      a: LottieBuilder.staticProp([0, 0, 0]), s: LottieBuilder.staticProp([100, 100, 100])
    }, { tt: 1 });
  }

  // --- Info mask + text (slides down from behind bottom line) ---
  if (!hideInfo) {
    const infoMaskH = infoBlockH + gapInfo * 2;
    const infoMaskCY = infoCY;

    builder.addShapeLayer('Info Mask', [makeGroup([
      makeRect(lineW, infoMaskH, 0),
      makeFill([1, 1, 1])
    ])], {
      o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.staticProp([linePosX, infoMaskCY, 0]),
      a: LottieBuilder.staticProp([lineAnchorX, 0, 0]),
      s: LottieBuilder.staticProp([100, 100, 100])
    }, { td: 1 });

    const infoSlideKFs = buildKeyframes([
      { pct: 0, value: [infoTextX, bottomLineCY - infoSizePx * 0.5, 0] },
      { pct: 30, value: [infoTextX, bottomLineCY - infoSizePx * 0.5, 0] },
      { pct: 60, value: [infoTextX, infoTextY, 0] },
      { pct: 100, value: [infoTextX, infoTextY, 0] }
    ], inF, holdF, outF, EASING);

    const infoTextData = makeTextData(infoText, fontFamily, infoSizePx, parseInt(infoWeight), infoCLottie, infoTransform, justify);

    builder.addFont(fontFamily, parseInt(infoWeight));
    builder.addTextLayer('Info', infoTextData, {
      o: LottieBuilder.staticProp(infoColorAlpha), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.animatedProp(infoSlideKFs),
      a: LottieBuilder.staticProp([0, 0, 0]), s: LottieBuilder.staticProp([100, 100, 100])
    }, { tt: 1 });
  }

  // --- Top line (expands from alignment side) ---
  builder.addShapeLayer('Top Line', [makeGroup([
    makeAnimatedRect(topLineInKFs, 0),
    makeFill(accentLottie, accentColorAlpha)
  ])], {
    o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
    p: LottieBuilder.staticProp([linePosX, topLineCY, 0]),
    a: LottieBuilder.staticProp([lineAnchorX, 0, 0]),
    s: LottieBuilder.staticProp([100, 100, 100])
  });

  // --- Bottom line (expands from alignment side, slightly faster) ---
  builder.addShapeLayer('Bottom Line', [makeGroup([
    makeAnimatedRect(bottomLineInKFs, 0),
    makeFill(accentLottie, accentColorAlpha)
  ])], {
    o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
    p: LottieBuilder.staticProp([linePosX, bottomLineCY, 0]),
    a: LottieBuilder.staticProp([lineAnchorX, 0, 0]),
    s: LottieBuilder.staticProp([100, 100, 100])
  });

  // --- Logo (optional) ---
  if (hasLogo) {
    const logoAspect = logoW && logoH ? logoW / logoH : 1;
    const lH = logoSizePx;
    const _logoScale = (lH / logoH) * 100;

    let logoCX;
    if (isCenter) {
      const maxW = Math.max(hideName ? 0 : nameM.width, hideInfo ? 0 : infoM.width);
      logoCX = canvasW / 2 - maxW / 2 - logoMargin - logoSizePx / 2;
    } else if (isRight) {
      logoCX = canvasW - marginHPx - logoSizePx / 2;
    } else {
      logoCX = marginHPx + logoSizePx / 2;
    }
    const logoCY = (topLineCY + bottomLineCY) / 2;

    const logoScaleKFs = buildKeyframes([
      { pct: 0, value: [0, 0, 100] },
      { pct: 25, value: [_logoScale, _logoScale, 100] },
      { pct: 100, value: [_logoScale, _logoScale, 100] }
    ], inF, holdF, outF, EASING);

    builder.addImageAsset('logo', logoData, logoW, logoH);
    builder.addImageLayer('Logo', 'logo', {
      o: LottieBuilder.staticProp(100), r: LottieBuilder.staticProp(0),
      p: LottieBuilder.staticProp([logoCX, logoCY, 0]),
      a: LottieBuilder.staticProp([logoW / 2, logoH / 2, 0]),
      s: LottieBuilder.animatedProp(logoScaleKFs)
    });
  }
}

// ============================================================
// MAIN GENERATION + PREVIEW
// ============================================================

let currentAnim = null;
let currentJSON = null;

function generate() {
  const cfg = getConfig();
  cfg.baseSize = cfg.baseSize * (cfg.canvasH / 1080) * cfg.scaleFactor;
  const fr = 30;
  const inFrames = Math.round(cfg.animDuration * fr);
  const holdFrames = Math.round(cfg.holdDuration * fr);
  const outFrames = inFrames;

  const builder = new LottieBuilder(cfg.canvasW, cfg.canvasH, fr);
  builder.setDuration(inFrames, holdFrames, outFrames);

  switch (cfg.style) {
    case '1': generateStyle1(builder, cfg); break;
    case '2': generateStyle2(builder, cfg); break;
    case '3': generateStyle3(builder, cfg); break;
    case '4': generateStyle4(builder, cfg); break;
    case '5': generateStyle5(builder, cfg); break;
    case '6': generateStyle6(builder, cfg); break;
    case '7': generateStyle7(builder, cfg); break;
    case '8': generateStyle8(builder, cfg); break;
    case '9': generateStyle9(builder, cfg); break;
    case '10': generateStyle10(builder, cfg); break;
  }

  currentJSON = builder.toJSON();

  // Update preview
  const container = document.getElementById('preview-container');
  if (currentAnim) {
    currentAnim.destroy();
    currentAnim = null;
  }

  resizePreview();

  currentAnim = lottie.loadAnimation({
    container: container,
    renderer: 'svg',
    loop: true,
    autoplay: true,
    animationData: JSON.parse(JSON.stringify(currentJSON))
  });

  document.getElementById('btnDownload').disabled = false;
  document.getElementById('btnPlayPause').disabled = false;
  document.getElementById('seekBar').disabled = false;
  document.getElementById('btnPlayPause').textContent = '⏸';

  // Sync seek bar with animation
  currentAnim.addEventListener('enterFrame', (e) => {
    const bar = document.getElementById('seekBar');
    bar.max = currentAnim.totalFrames;
    bar.value = e.currentTime;
    document.getElementById('frameDisplay').textContent =
      Math.round(e.currentTime) + ' / ' + Math.round(currentAnim.totalFrames);
  });

  document.getElementById('status').textContent =
    `Generated: ${currentJSON.layers.length} layers, ${currentJSON.op} frames (${(currentJSON.op / fr).toFixed(1)}s)`;
}

function download() {
  if (!currentJSON) return;
  const nameVal = (document.getElementById('nameText').value.trim() || 'lower-third');
  const infoVal = (document.getElementById('infoText').value.trim());
  const styleEl = document.getElementById('styleType');
  const styleLabel = styleEl.options[styleEl.selectedIndex].text.replace(/\s*—.*/, '').trim();
  const baseName = (infoVal ? nameVal + ' - ' + infoVal : nameVal);
  const filename = styleLabel + ' - ' + baseName + '.json';
  const jsonStr = JSON.stringify(currentJSON, null, 2);
  // If running inside the JVM WebView, hand off to the native bridge
  if (window._jvmBridge) {
    window._jvmBridge.save(filename, jsonStr);
    return;
  }
  // Fallback: standard browser blob download
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Resize preview container to fit available space
function resizePreview() {
  const container = document.getElementById('preview-container');
  const cfg = getConfig();
  // Reset container size so parent can shrink freely
  container.style.width = '0';
  container.style.height = '0';
  const maxW = container.parentElement.clientWidth - 40;
  const maxH = container.parentElement.clientHeight - 100;
  const scale = Math.min(maxW / cfg.canvasW, maxH / cfg.canvasH, 1);
  container.style.width = (cfg.canvasW * scale) + 'px';
  container.style.height = (cfg.canvasH * scale) + 'px';
  if (currentAnim) currentAnim.resize();
}

// Debounced auto-generation
let _generateTimer = null;
function scheduleGenerate(delay) {
  if (_generateTimer) clearTimeout(_generateTimer);
  _generateTimer = setTimeout(() => {
    _generateTimer = null;
    generate();
  }, delay);
}

// Canvas preset buttons
document.querySelectorAll('.canvas-preset').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('canvasW').value = btn.dataset.w;
    document.getElementById('canvasH').value = btn.dataset.h;
    scheduleGenerate(100);
  });
});

// Timing preset buttons
document.querySelectorAll('.timing-preset').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('animDuration').value = btn.dataset.anim;
    document.getElementById('holdDuration').value = btn.dataset.hold;
    scheduleGenerate(100);
  });
});

// Event listeners
document.getElementById('btnDownload').addEventListener('click', download);
let isPlaying = true;
document.getElementById('btnPlayPause').addEventListener('click', () => {
  if (!currentAnim) return;
  if (isPlaying) {
    currentAnim.pause();
    isPlaying = false;
    document.getElementById('btnPlayPause').textContent = '▶';
  } else {
    currentAnim.play();
    isPlaying = true;
    document.getElementById('btnPlayPause').textContent = '⏸';
  }
});
document.getElementById('seekBar').addEventListener('input', (e) => {
  if (!currentAnim) return;
  const frame = parseFloat(e.target.value);
  if (isPlaying) {
    currentAnim.goToAndPlay(frame, true);
  } else {
    currentAnim.goToAndStop(frame, true);
  }
});

// Live preview: auto-regenerate on any input change
// Text inputs use longer debounce (wait for user to stop typing)
['nameText', 'infoText'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => scheduleGenerate(500));
});

// Style 4 doesn't support center alignment
document.getElementById('styleType').addEventListener('change', () => {
  const align = document.getElementById('alignment');
  const centerOpt = align.querySelector('option[value="center"]');
  const sv = document.getElementById('styleType').value;
  if (sv === '4') {
    centerOpt.disabled = true;
    if (align.value === 'center') { align.value = 'left'; }
  } else {
    centerOpt.disabled = false;
  }
  // Style 4 and 8 default border thickness to 2, others default to 0
  const borderSlider = document.getElementById('borderThickness');
  const borderVal = document.getElementById('borderThicknessVal');
  if ((sv === '4' || sv === '8') && parseFloat(borderSlider.value) === 0) {
    borderSlider.value = 2;
    borderVal.textContent = '2';
  } else if (sv !== '4' && sv !== '8' && parseFloat(borderSlider.value) === 2) {
    borderSlider.value = 0;
    borderVal.textContent = '0';
  }
});

// All other inputs: immediate/short debounce
['canvasW', 'canvasH', 'styleType', 'alignment', 'fontFamily', 'baseSize',
 'nameSize', 'infoSize', 'nameWeight', 'infoWeight', 'nameTransform', 'infoTransform',
 'nameColor', 'infoColor', 'accentColor', 'bgColor', 'borderColor',
 'nameColorAlpha', 'infoColorAlpha', 'accentColorAlpha', 'bgColorAlpha', 'borderColorAlpha',
 'scaleFactor',
 'corners', 'borderThickness', 'bgEnabled', 'shadowEnabled', 'hideName', 'hideInfo',
 'logoEnabled', 'logoSize', 'animDuration', 'holdDuration',
 'marginH', 'marginV', 'lineSpacing'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => scheduleGenerate(100));
  el.addEventListener('change', () => scheduleGenerate(100));
});


// Window resize handler
let _resizeTimer = null;
window.addEventListener('resize', () => {
  if (_resizeTimer) clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(resizePreview, 150);
});

// Preset library button
document.getElementById('btnSavePreset').addEventListener('click', () => savePreset());

// Color library button
document.getElementById('btnSaveColors').addEventListener('click', () => saveColorTheme());

// Auto-generate on load after fonts are ready
document.fonts.ready.then(() => {
  setTimeout(generate, 200);
});
let serverAvailable = false;

async function checkServer() {
  try {
    const r = await fetch('/api/presets');
    if (r.ok) serverAvailable = true;
  } catch(e) { serverAvailable = false; }
  applyServerVisibility();
}

function applyServerVisibility() {
  const hide = !serverAvailable;
  document.getElementById('btnSavePreset').style.display = hide ? 'none' : '';
  document.getElementById('libraryHeading').style.display = hide ? 'none' : '';
  document.getElementById('libraryList').style.display = hide ? 'none' : '';
  document.getElementById('btnSaveColors').style.display = hide ? 'none' : '';
  document.getElementById('logoSection').style.display = hide ? 'none' : '';
}

checkServer().then(() => {
  if (serverAvailable) {
    loadPresetsFromDisk();
    loadColorThemesFromDisk();
    loadLogoList();
  } else {
    colorThemes = [...DEFAULT_COLOR_THEMES];
    renderColorLibrary();
  }
});
</script>
